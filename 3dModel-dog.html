<!DOCTYPE html>
<html>

    <body>
    <a-scene>
      <a-entity
      camera wasd-controls look-controls position="0 3 20"
animation="property:position; to: 0 3 0; dur: 10000"

      
      
      ></a-entity>


      <a-sky color="lightblue"></a-sky>
      
      <a-entity 
      ply-model="src:dog.ply"
      position="0 1 -2"
      rotation="-90 90 0"
      animation="
      property:rotation;
      from: -90 90 0;
      to: 180 200 0;
      dur:2000;
      dir:alternate;
      loop:true;
      
    "
      ></a-entity>
              
      
    
    </a-scene>
