<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="blue"></a-sky>

        <a-box color="black" animation="
        property:position;
        from: 2 1 -4;
        to: 4 3 1;
        dir: alternate;
        loop: true;
        
        "
        ></a-box>
    
<a-cylinder position="1 2 3" color="yellow"

animation="
property:color;
from: yellow;
to: red;
loop:true;




"



></a-cylinder>





        </a-scene>
    </body>
</html>
