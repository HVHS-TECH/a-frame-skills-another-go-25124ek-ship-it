<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="blue"></a-sky>

        <a-box color="black" animation="
        property:position;
        from: 2 1 -4;
        to: 4 3 -5;
        dir: alternate;
        loop: true;
        
        "
        ></a-box>
    
<a-cylinder position="1 2 -5" color="yellow"

animation="
property:position;
from:1 0 -4;
to: 2 3 -4;
dur:2000;
loop:true;




"
"



></a-cylinder>

<a-cone
color="red"
position="-2 3 -6"
animation="
property:rotation;
from: 180 0 90;
to: 300 10 180;
loop:true;
dir:alternate;



""
></a-cone>

<a-sphere
color="purple"
position="1 2 -7"
radius="2"
animation="
property:color;



"


>



</a-sphere>





        </a-scene>
    </body>
</html>
